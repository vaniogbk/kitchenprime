# /etc/nginx/sites-available/kitchenprime
# Reverse proxy to Next.js standalone server on :3000.
# SSL setup via Hostinger (Let's Encrypt) — uncomment the 443 block once issued.

upstream kitchenprime_upstream {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name kitchenprime.com www.kitchenprime.com;

  # Uncomment after SSL is issued:
  # return 301 https://$host$request_uri;

  client_max_body_size 8m;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  location /_next/static/ {
    proxy_cache_valid 200 365d;
    expires 365d;
    access_log off;
    proxy_pass http://kitchenprime_upstream;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_pass http://kitchenprime_upstream;
  }
}

