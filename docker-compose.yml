services:
  db:
    image: postgres:16-alpine
    container_name: kitchenprime-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kitchenprime}
      POSTGRES_USER: ${POSTGRES_USER:-kitchenprime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitchenprime}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kitchenprime}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [web]

  app:
    build: .
    image: kitchenprime:latest
    container_name: kitchenprime-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"
    networks: [web]

volumes:
  dbdata:

networks:
  web:
    driver: bridge
